name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # Se sua branch for 'master', troque aqui

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_PROJECT_ID: "vpmukocqdtljdxqndwts"
          VITE_SUPABASE_URL: "https://vpmukocqdtljdxqndwts.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "sb_publishable__ou8zAv4B5X1J08x4BaMVA_tSaJ7Zz9"
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4