name: Deploy Vite Site to Pages

on:
  push:
    branches: ["main"] # Altere para "master" se a sua branch principal tiver esse nome

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci # ou npm install se não tiver o package-lock.json redondo

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_PROJECT_ID: "vpmukocqdtljdxqndwts"
          VITE_SUPABASE_URL: "https://vpmukocqdtljdxqndwts.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "sb_publishable__ou8zAv4B5X1J08x4BaMVA_tSaJ7Zz9"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4